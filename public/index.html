    <meta name="theme-color" content="#0a0a0c" />
    <meta name="description" content="Wireway — Professional NEC 2023 electrical estimating. Build quotes, track labor and materials, send to clients." />
    <meta name="apple-mobile-web-app-title" content="Wireway" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta property="og:title" content="Wireway — AI Electrical Estimating" />

    <meta property="og:url" content="https://www.wirewaypro.com" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Wireway</title>
    <script>
      window.onerror = function (msg, src, line) {
        var el = document.getElementById("root");
        if (el && !el.hasChildNodes()) {
          el.innerHTML = '<div style="font-family:sans-serif;color:#fff;background:#0a0a0c;min-height:100vh;padding:40px 24px;text-align:center"><div style="font-size:40px;margin-bottom:16px">⚡</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Wireway had trouble loading in this browser</div><div style="font-size:13px;color:#aaa;margin-bottom:20px">Tap the menu and choose "Open in Browser" (Safari or Chrome) for the full experience.</div><div style="font-size:10px;color:#555">' + String(msg).slice(0,160) + '</div></div>';
        }
      };
    </script>
      <style>
      :root {
        --accent: #3aa9ff;
        --accent-rgb: 58,169,255;
        --bg0: #080b10;
        --surface: #0e1420;
        --bg-scene: radial-gradient(ellipse 70% 38% at 50% 0%, rgba(58,169,255,0.10), transparent 60%), radial-gradient(ellipse 60% 42% at 90% 100%, rgba(35,164,85,0.07), transparent 60%), #080b10;
        --line: rgba(98,165,255,0.13);
        --line-strong: rgba(98,165,255,0.22);
        --card: rgba(58,169,255,0.045);
      }
      html { -webkit-text-size-adjust: 100%; }
      body {
        background: var(--bg-scene);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none;
      }
      button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
      button:active { transform: scale(0.97); }
      input, textarea, select { font-family: inherit; }
      ::selection { background: rgba(var(--accent-rgb), 0.3); }
      @media print { button:active { transform: none; } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Wireway.</noscript>
    <div id="root"></div>
  </body>
</html>
